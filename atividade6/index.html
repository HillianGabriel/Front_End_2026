<!DOCTYPE html>
<html lang="pt-BR" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bichinho Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #2a303c; 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease;
        }
        .tema-dia { background-image: url('./imagens/fundo.png'); }
        .tema-noite { background-image: url('./imagens/noite.png'); }
        
        .pet-bounce { animation: bounce 3s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 tema-dia">

    <div class="fixed top-6 w-full max-w-4xl px-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-3 bg-base-100/70 backdrop-blur-md p-2 rounded-full shadow-lg border border-white/20">
            <input type="text" id="pet-name" placeholder="Nome do Pet" 
                   class="input input-ghost input-sm font-bold text-lg w-32 md:w-48" onchange="salvarNome()">
        </div>

        <label class="swap swap-rotate btn btn-circle btn-md bg-base-100/70 border-none shadow-lg">
            <input type="checkbox" id="theme-toggle" onclick="mudarClima()" checked />
            <svg class="swap-on fill-yellow-500 w-7 h-7" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
            <svg class="swap-off fill-indigo-500 w-7 h-7" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,11.75,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.69Z"/></svg>
        </label>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-md mt-24 mb-8 bg-base-100/40 backdrop-blur-md p-4 rounded-2xl shadow-xl">
        <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase opacity-70">Fome</span>
            <progress id="barra-fome" class="progress progress-primary w-full h-3" value="100" max="100"></progress>
        </div>
        <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase opacity-70">Felicidade</span>
            <progress id="barra-feliz" class="progress progress-secondary w-full h-3" value="100" max="100"></progress>
        </div>
    </div>

    <div class="relative flex-1 flex items-center justify-center">
        <img id="main" src="./imagens/coelhofeliz.png" class="w-64 md:w-96 drop-shadow-2xl pet-bounce transition-all duration-300">
    </div>

    <div class="flex gap-8 mb-12">
        <div class="flex flex-col items-center gap-2">
            <button onclick="alimentando()" class="btn btn-circle btn-lg md:btn-xl bg-white hover:scale-110 shadow-xl border-4 border-primary">
                <img src="./imagens/fruta.png" class="w-10">
            </button>
            <span class="badge badge-primary font-bold">Comer</span>
        </div>
        
        <div class="flex flex-col items-center gap-2">
            <button onclick="brincar()" class="btn btn-circle btn-lg md:btn-xl bg-white hover:scale-110 shadow-xl border-4 border-secondary text-3xl">
                ⚽
            </button>
            <span class="badge badge-secondary font-bold">Brincar</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
