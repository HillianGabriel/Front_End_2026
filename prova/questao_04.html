<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <style>
        body, html {
            min-height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #071b2f;
        }

        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 360px;
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255,255,255,0.35);
            box-shadow: 0 18px 45px rgba(0,0,0,0.25);
        }

        .card-img-top {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .card-body {
            padding: 1.6rem;
        }

        .btn-revelar {
            margin: 14px auto 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            padding: 12px 20px;
        }

        h5.card-title {
            margin-bottom: 1rem;
        }

        .card-text {
            color: #23405e;
            font-size: 0.98rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="bg-copa">
        <div class="d-flex flex-column align-items-center">       
            <div class="card">
                <img src="img/img_.svg" class="card-img-top" alt="Placeholder Copa">
                <div class="card-body"> 
                    <h5 class="card-title placeholder-glow">
                        <span id="Nome" class="placeholder col-6"></span>
                        <span id="Rank" class="badge text-bg-secondary">-</span>
                    </h5>
                    <p class="card-text placeholder-glow">
                        <span id="Data_Nas" class="placeholder col-4"></span><br>
                        <span id="Altura" class="placeholder col-4"></span><br>
                        <span id="Posicao" class="placeholder col-6"></span><br>
                    </p>
                </div>
            </div>
            <button type="button" onclick="revelar()" class="btn btn-primary btn-revelar">
                Revelar
            </button>
        </div>
    </div>

    <script src="js\bootstrap.js"></script>
    <script src="script.js"></script>
</body>
</html>
