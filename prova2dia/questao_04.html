<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            gap: 30px;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 3px 12px rgba(0,0,0,0.7);
            letter-spacing: 3px;
            text-align: center;
        }

        #Cards {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }

        .card {
            width: 22rem;
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.55);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: cardEntrada 0.5s ease both;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.65);
        }

        @keyframes cardEntrada {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-img-top {
            width: 100%;
            height: 280px;
            object-fit: cover;
            object-position: top center;
        }

        .card-img-placeholder {
            width: 100%;
            height: 280px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
        }

        .card-body {
            padding: 16px 18px 18px;
            font-family: 'Inter', sans-serif;
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .badge {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: linear-gradient(135deg, #2e7d32, #43a047) !important;
            color: #fff !important;
        }

        .card-text {
            font-size: 0.9rem;
            color: #444;
            line-height: 1.8;
            margin: 0;
        }

        .card-text strong {
            color: #1b5e20;
        }

        .card-divider {
            height: 3px;
            background: linear-gradient(90deg, #1b5e20, #f9a825, #1b5e20);
            margin: 10px 0;
            border-radius: 2px;
        }

        .btn-adicionar {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 12px 32px;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border: none;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .btn-adicionar:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #2e7d32, #388e3c);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="bg-copa">

        <div class="page-title">Copa do Mundo 2026</div>

        <div id="Cards">
            <div class="card" aria-hidden="true">
                <img src="img/_vinicius_junior.png"
                     class="card-img-top"
                     alt="Vinicius Junior"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="card-img-placeholder"></div>

                <div class="card-body">
                    <h5 id="Nome" class="card-title">
                        Vini JR.
                        <span id="Rank" class="badge">9,5</span>
                    </h5>
                    <div class="card-divider"></div>
                    <p class="card-text">
                        <span id="Data_Nas"><strong>Nascimento:</strong> 12/07/2000</span><br>
                        <span id="Alutra"><strong>Altura:</strong> 1,76 m</span><br>
                        <span id="Posicao"><strong>Posição:</strong> Ponta-esquerda / Atacante</span>
                    </p>
                </div>
            </div>
        </div>

        <a href="#" onclick="add(); return false;" class="btn-adicionar">
            Adicionar Novo Jogador
        </a>

    </div>

    <script src="js/bootstrap.js"></script>
    <script src="script.js"></script>
</body>
</html>
